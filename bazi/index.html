<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命理排盘</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Songti SC','SimSun','Noto Serif SC',serif;background:#0a0a12;color:#e8dcc8;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:28px;color:#f0c860;margin:20px 0 8px;letter-spacing:8px;text-shadow:0 0 20px rgba(240,200,96,.3)}
.subtitle{text-align:center;font-size:13px;color:rgba(232,220,200,.4);margin-bottom:30px;letter-spacing:4px}
.input-panel{background:linear-gradient(135deg,rgba(30,25,40,.9),rgba(20,18,30,.95));border:1px solid rgba(240,200,96,.2);border-radius:12px;padding:24px;margin-bottom:24px;backdrop-filter:blur(10px)}
.input-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:11px;color:rgba(232,220,200,.5);letter-spacing:2px}
.input-group select,.input-group input{background:rgba(255,255,255,.06);border:1px solid rgba(240,200,96,.2);color:#e8dcc8;padding:8px 12px;border-radius:6px;font-size:14px;font-family:inherit;width:90px}
.input-group select:focus,.input-group input:focus{outline:none;border-color:#f0c860;box-shadow:0 0 8px rgba(240,200,96,.2)}
.input-group input[type=time]{width:110px}
.btn-calc{background:linear-gradient(135deg,#f0c860,#d4a040);color:#1a1520;border:none;padding:10px 32px;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;letter-spacing:4px;font-family:inherit;transition:all .2s}
.btn-calc:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(240,200,96,.4)}
.gender-toggle{display:flex;gap:4px}
.gender-btn{padding:8px 16px;border:1px solid rgba(240,200,96,.2);background:transparent;color:rgba(232,220,200,.5);border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;transition:all .2s}
.gender-btn.active{background:rgba(240,200,96,.15);color:#f0c860;border-color:#f0c860}
.result{display:none}.result.show{display:block}
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.pillar{text-align:center;background:linear-gradient(180deg,rgba(40,30,55,.9),rgba(25,20,35,.95));border:1px solid rgba(240,200,96,.15);border-radius:10px;padding:16px 8px}
.pillar-label{font-size:11px;color:rgba(232,220,200,.4);letter-spacing:2px;margin-bottom:8px}
.pillar-stem{font-size:28px;font-weight:bold;margin:4px 0;line-height:1.2}
.pillar-branch{font-size:28px;font-weight:bold;margin:4px 0;line-height:1.2}
.pillar-sub{font-size:10px;color:rgba(232,220,200,.35);margin-top:6px}
.el-木{color:#6bc96b}.el-火{color:#ff6b6b}.el-土{color:#f0c860}.el-金{color:#e0e0e0}.el-水{color:#6bb5ff}
.bg-木{background:rgba(107,201,107,.15)}.bg-火{background:rgba(255,107,107,.15)}.bg-土{background:rgba(240,200,96,.15)}.bg-金{background:rgba(224,224,224,.15)}.bg-水{background:rgba(107,181,255,.15)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.info-card{background:rgba(30,25,40,.8);border:1px solid rgba(240,200,96,.1);border-radius:8px;padding:14px}
.info-card h3{font-size:12px;color:rgba(232,220,200,.4);letter-spacing:2px;margin-bottom:8px}
.info-card .val{font-size:16px;color:#f0c860}
.elements-chart{display:flex;gap:12px;align-items:flex-end;justify-content:center;height:120px;margin:16px 0}
.element-bar{display:flex;flex-direction:column;align-items:center;gap:4px;width:50px}
.element-bar .bar{width:30px;border-radius:4px 4px 0 0;min-height:4px;transition:height .5s}
.element-bar .label{font-size:14px;font-weight:bold}
.element-bar .count{font-size:10px;color:rgba(232,220,200,.4)}
.luck-section{margin-bottom:24px}
.luck-section h2{font-size:16px;color:#f0c860;margin-bottom:12px;letter-spacing:4px;border-bottom:1px solid rgba(240,200,96,.15);padding-bottom:8px}
.luck-grid{display:flex;gap:6px;flex-wrap:wrap}
.luck-pillar{text-align:center;background:rgba(30,25,40,.8);border:1px solid rgba(240,200,96,.1);border-radius:6px;padding:8px 6px;min-width:56px}
.luck-age{font-size:10px;color:rgba(232,220,200,.35)}
.luck-stem{font-size:18px;font-weight:bold}
.luck-branch{font-size:18px;font-weight:bold}
.ten-gods{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.god-tag{padding:4px 12px;border-radius:16px;font-size:12px;border:1px solid rgba(240,200,96,.15)}
.tab-nav{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid rgba(240,200,96,.1);padding-bottom:8px}
.tab-btn{padding:8px 16px;background:transparent;border:none;color:rgba(232,220,200,.4);cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:2px;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#f0c860;border-bottom-color:#f0c860}
.tab-content{display:none}.tab-content.active{display:block}
.zw-chart{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:24px}
.zw-palace{background:rgba(30,25,40,.85);border:1px solid rgba(240,200,96,.12);border-radius:6px;padding:8px;min-height:90px;cursor:pointer;transition:border-color .2s}
.zw-palace:hover{border-color:rgba(240,200,96,.35)}
.zw-palace.life{border-color:rgba(240,200,96,.5);box-shadow:0 0 10px rgba(240,200,96,.1)}
.zw-palace-name{font-size:10px;color:rgba(232,220,200,.4);letter-spacing:1px}
.zw-star{display:inline-block;font-size:11px;margin:1px 2px;padding:1px 4px;border-radius:3px}
.zw-star.major{color:#f0c860;font-weight:bold}
.zw-star.minor{color:rgba(232,220,200,.5)}
.zw-star.bright{color:#ff6b6b}
.zw-mutagen{font-size:9px;color:#6bb5ff;margin-left:2px}

/* Analysis sections */
.analysis-section{background:rgba(25,20,35,.9);border:1px solid rgba(240,200,96,.12);border-radius:10px;padding:20px;margin-bottom:20px}
.analysis-section h2{font-size:18px;color:#f0c860;margin-bottom:16px;letter-spacing:4px;display:flex;align-items:center;gap:8px}
.analysis-section h2::before{content:'';display:inline-block;width:3px;height:18px;background:#f0c860;border-radius:2px}
.analysis-section h3{font-size:14px;color:rgba(232,220,200,.7);margin:14px 0 8px;letter-spacing:2px}
.analysis-text{font-size:14px;line-height:2;color:rgba(232,220,200,.75);text-align:justify}
.highlight{color:#f0c860;font-weight:bold}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;margin:2px 4px;border:1px solid}
.tag-good{color:#6bc96b;border-color:rgba(107,201,107,.3);background:rgba(107,201,107,.08)}
.tag-bad{color:#ff6b6b;border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.08)}
.tag-neutral{color:#6bb5ff;border-color:rgba(107,181,255,.3);background:rgba(107,181,255,.08)}
.score-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.06);margin:8px 0;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .8s}

@media(max-width:600px){
  .pillars{grid-template-columns:repeat(2,1fr)}
  .zw-chart{grid-template-columns:repeat(3,1fr)}
  .input-row{flex-direction:column}
  h1{font-size:22px;letter-spacing:4px}
}
</style>
</head>
<body>
<div class="container">
  <h1>天 机 命 盘</h1>
  <div class="subtitle">八字排盘 · 紫微斗数 · 命理解析</div>

  <div class="input-panel">
    <div class="input-row">
      <div class="input-group"><label>出生年</label><input type="number" id="year" value="1990" min="1900" max="2100"></div>
      <div class="input-group"><label>月</label><select id="month"></select></div>
      <div class="input-group"><label>日</label><select id="day"></select></div>
      <div class="input-group"><label>时辰</label><select id="hour">
        <option value="0">子时 (23-01)</option><option value="2">丑时 (01-03)</option><option value="4">寅时 (03-05)</option>
        <option value="6">卯时 (05-07)</option><option value="8">辰时 (07-09)</option><option value="10">巳时 (09-11)</option>
        <option value="12" selected>午时 (11-13)</option><option value="14">未时 (13-15)</option><option value="16">申时 (15-17)</option>
        <option value="18">酉时 (17-19)</option><option value="20">戌时 (19-21)</option><option value="22">亥时 (21-23)</option>
      </select></div>
      <div class="input-group"><label>性别</label><div class="gender-toggle">
        <button class="gender-btn active" data-g="male">♂ 男</button>
        <button class="gender-btn" data-g="female">♀ 女</button>
      </div></div>
      <div class="input-group" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn-calc" onclick="calculate()">起 盘</button></div>
    </div>
  </div>

  <div id="result" class="result">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="bazi">八字排盘</button>
      <button class="tab-btn" data-tab="analysis">命理解析</button>
      <button class="tab-btn" data-tab="ziwei">紫微斗数</button>
    </div>

    <div id="tab-bazi" class="tab-content active">
      <div id="pillars" class="pillars"></div>
      <div id="info-cards" class="info-grid"></div>
      <div id="elements-section"><h2 style="font-size:16px;color:#f0c860;margin-bottom:12px;letter-spacing:4px;border-bottom:1px solid rgba(240,200,96,.15);padding-bottom:8px">五行力量</h2><div id="elements-chart" class="elements-chart"></div></div>
      <div id="ten-gods-section"><h2 style="font-size:16px;color:#f0c860;margin-bottom:12px;letter-spacing:4px;border-bottom:1px solid rgba(240,200,96,.15);padding-bottom:8px">十神</h2><div id="ten-gods" class="ten-gods"></div></div>
      <div id="luck-section" class="luck-section"></div>
    </div>

    <div id="tab-analysis" class="tab-content">
      <div id="analysis-content"></div>
    </div>

    <div id="tab-ziwei" class="tab-content">
      <div id="zw-info" class="info-grid" style="margin-bottom:16px"></div>
      <div id="zw-chart" class="zw-chart"></div>
      <div id="zw-analysis" class="analysis-section" style="display:none"></div>
    </div>
  </div>
</div>

// ===== Init =====
const monthSel=document.getElementById('month'),daySel=document.getElementById('day');

for(let i=1;i<=31;i++) daySel.innerHTML+=`<option value="${i}">${i}日</option>`;
monthSel.value=5;daySel.value=15;
let gender='male';
document.querySelectorAll('.gender-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.gender-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');gender=b.dataset.g}});
document.querySelectorAll('.tab-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active')}});

// ===== Calculate =====
function calculate(){
  const year=+document.getElementById('year').value,month=+monthSel.value,day=+daySel.value,hour=+document.getElementById('hour').value;
  try{
    const solar=Solar.fromYmdHms(year,month,day,hour,0,0);
    const lunar=solar.getLunar();
    const ec=lunar.getEightChar();
    renderBaZi(ec,lunar,solar);
    renderAnalysis(ec,lunar,solar);
    try{
      const zwData=iztro.astro.bySolar(`${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`,Math.floor(hour/2),gender==='male');
      renderZiWei(zwData);
      renderZwAnalysis(zwData);
    }catch(e){console.warn('ZiWei error:',e)}
    document.getElementById('result').classList.add('show');
  }catch(e){console.error(e);alert('排盘出错：'+e.message)}
}

function renderBaZi(ec,lunar,solar){
  const pillars=[
    {label:'年柱',stem:ec.getYearGan(),branch:ec.getYearZhi()},
    {label:'月柱',stem:ec.getMonthGan(),branch:ec.getMonthZhi()},
    {label:'日柱',stem:ec.getDayGan(),branch:ec.getDayZhi()},
    {label:'时柱',stem:ec.getTimeGan(),branch:ec.getTimeZhi()}
  ];
  document.getElementById('pillars').innerHTML=pillars.map(p=>{
    const s=STEM_EL[p.stem],b=BRANCH_EL[p.branch];
    return`<div class="pillar"><div class="pillar-label">${p.label}</div><div class="pillar-stem el-${s}">${p.stem}</div><div class="pillar-branch el-${b}">${p.branch}</div><div class="pillar-sub">${s}${b!==s?' · '+b:''}</div></div>`
  }).join('');

  const dm=ec.getDayGan();
  document.getElementById('info-cards').innerHTML=`
    <div class="info-card"><h3>生肖</h3><div class="val">${lunar.getYearShengXiao()}</div></div>
    <div class="info-card"><h3>日主</h3><div class="val el-${STEM_EL[dm]}">${dm} ${STEM_EL[dm]}</div></div>
    <div class="info-card"><h3>年纳音</h3><div class="val">${lunar.getYearNaYin()}</div></div>
    <div class="info-card"><h3>农历</h3><div class="val">${lunar.getYearInChinese()}年${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}</div></div>`;

  const elCount={木:0,火:0,土:0,金:0,水:0};
  pillars.forEach(p=>{elCount[STEM_EL[p.stem]]++;elCount[BRANCH_EL[p.branch]]++});
  const mx=Math.max(...Object.values(elCount),1);
  document.getElementById('elements-chart').innerHTML=EL_ORDER.map(el=>{
    const c=elCount[el],h=c/mx*80+4;
    return`<div class="element-bar"><div class="count">${c}</div><div class="label el-${el}">${el}</div><div class="bar bg-${el}" style="height:${h}px"></div></div>`
  }).join('');

  const gods=calcTenGods(dm,pillars);
  document.getElementById('ten-gods').innerHTML=gods.map(g=>`<span class="god-tag el-${STEM_EL[g.stem]}">${g.pos}: ${g.stem} (${g.god})</span>`).join('');
  renderLuckPillars(ec,lunar);
}

function calcTenGods(dm,pillars){
  const el=STEM_EL[dm],isY=YANG.includes(dm);
  const P={木:'火',火:'土',土:'金',金:'水',水:'木'},PB={木:'水',水:'金',金:'土',土:'火',火:'木'};
  const C={木:'土',土:'水',水:'火',火:'金',金:'木'},CB={木:'金',金:'火',火:'水',水:'土',土:'木'};
  function god(s){const se=STEM_EL[s],same=isY===YANG.includes(s);
    if(se===el)return same?'比肩':'劫财';if(P[el]===se)return same?'食神':'伤官';
    if(PB[el]===se)return same?'偏印':'正印';if(C[el]===se)return same?'偏财':'正财';
    if(CB[el]===se)return same?'七杀':'正官';return'-'}
  const pos=['年干','月干','日干','时干'];
  return pillars.map((p,i)=>({stem:p.stem,pos:pos[i],god:i===2?'日主':god(p.stem)}))
}

function renderLuckPillars(ec,lunar){
  try{
    const yun=ec.getYun(gender==='male'?1:0),daYun=yun.getDaYun();
    let html='<h2>大运</h2><div class="luck-grid">';
    html+=`<div style="width:100%;font-size:12px;color:rgba(232,220,200,.35);margin-bottom:8px">起运：${yun.getStartYear()}岁</div>`;
    daYun.forEach((dy,i)=>{if(i===0)return;const gz=dy.getGanZhi();if(!gz||gz.length<2)return;
      const s=gz[0],b=gz[1];html+=`<div class="luck-pillar"><div class="luck-age">${dy.getStartYear?dy.getStartYear()+'岁':''}</div><div class="luck-stem el-${STEM_EL[s]||''}">${s}</div><div class="luck-branch el-${BRANCH_EL[b]||''}">${b}</div></div>`});
    html+='</div>';document.getElementById('luck-section').innerHTML=html;
  }catch(e){document.getElementById('luck-section').innerHTML=''}
}

// ===== Analysis =====
function renderAnalysis(ec,lunar,solar){
  const dm=ec.getDayGan(),info=DM_ANALYSIS[dm];
  if(!info)return;
  const pillars=[{stem:ec.getYearGan(),branch:ec.getYearZhi()},{stem:ec.getMonthGan(),branch:ec.getMonthZhi()},{stem:ec.getDayGan(),branch:ec.getDayZhi()},{stem:ec.getTimeGan(),branch:ec.getTimeZhi()}];
  const gods=calcTenGods(dm,pillars);
  const elCount={木:0,火:0,土:0,金:0,水:0};
  pillars.forEach(p=>{elCount[STEM_EL[p.stem]]++;elCount[BRANCH_EL[p.branch]]++});
  const dmEl=STEM_EL[dm],total=8;
  const selfCount=elCount[dmEl],assistEl=({木:'水',火:'木',土:'火',金:'土',水:'金'})[dmEl];

  const strong=strength>=4;
  const currentYear=new Date().getFullYear();

  const yearStem=yearLunar.getYearGan();

  // Ten Gods interpretation
  const godsSummary=gods.filter(g=>g.pos!=='日干').map(g=>{
    const info=TEN_GOD_ANALYSIS[g.god];
    return info?`<div class="analysis-section" style="padding:14px;margin-bottom:12px">
      <h3 style="margin:0 0 6px"><span class="el-${STEM_EL[g.stem]}">${g.god}</span> <span style="color:rgba(232,220,200,.3);font-size:11px">(${g.pos} ${g.stem})</span></h3>
      <div class="analysis-text" style="font-size:13px">${info.desc}</div>
      <div style="margin-top:6px"><span class="tag tag-neutral">事业：${info.career}</span></div>
      <div style="margin-top:4px"><span class="tag tag-neutral">感情：${info.love}</span></div>
    </div>`:''
  }).join('');

  const html=`
    <div class="analysis-section">
      <h2>日主解析 · ${info.name} ${info.img}</h2>
      <div class="analysis-text">${info.trait}</div>
      <div style="margin-top:12px">
        <h3>五行喜忌</h3>
        <div style="margin:8px 0"><span class="tag tag-good">✓ 喜：${info.favor}</span></div>
        <div style="margin:8px 0"><span class="tag tag-bad">✗ 忌：${info.avoid}</span></div>
      </div>
      <div style="margin-top:12px">
        <h3>日主强弱</h3>
        <div class="score-bar"><div class="score-fill" style="width:${Math.min(100,strength/total*100)}%;background:${strong?'#6bc96b':'#ff6b6b'}"></div></div>
        <div class="analysis-text">日主<span class="highlight">${dm}${dmEl}</span>，${strong?'偏强':'偏弱'}。${strong?'喜克泄耗（'+({木:'金火土',火:'水土金',土:'木水金',金:'火木水',水:'土木火'})[dmEl]+'）来平衡。':'喜生扶（'+assistEl+'、'+dmEl+'）来增强。'}</div>
      </div>
    </div>

    <div class="analysis-section">
      <h2>性格特质</h2>
      <div class="analysis-text">${info.trait}</div>
    </div>

    <div class="analysis-section">
      <h2>事业方向</h2>
      <div class="analysis-text">适合行业：<span class="highlight">${info.career}</span></div>
      <div class="analysis-text" style="margin-top:8px">日主${dmEl}之人，${({木:'具有生长、拓展的能力，适合需要创新和领导力的工作。',火:'具有感染力和创造力，适合需要表现力和热情的行业。',土:'稳重踏实有耐心，适合需要长期积累和稳定性的领域。',金:'果断刚毅有执行力，适合需要精准和纪律的行业。',水:'灵活机智善变通，适合需要应变力和沟通能力的工作。'})[dmEl]}</div>
    </div>

    <div class="analysis-section">
      <h2>感情婚姻</h2>
      <div class="analysis-text">${info.love}</div>
      <div class="analysis-text" style="margin-top:8px">${gender==='male'?
        ({木:'男命以土为财星（妻星），八字中土的强弱影响婚姻质量。',火:'男命以金为财星（妻星），金旺则妻贤且有助力。',土:'男命以水为财星（妻星），水旺则妻聪慧灵动。',金:'男命以木为财星（妻星），木旺则妻温柔有才华。',水:'男命以火为财星（妻星），火旺则妻热情有活力。'})[dmEl]:
        ({木:'女命以金为官星（夫星），金旺则夫有能力有担当。',火:'女命以水为官星（夫星），水旺则夫聪明有谋略。',土:'女命以木为官星（夫星），木旺则夫正直有上进心。',金:'女命以火为官星（夫星），火旺则夫热情有魅力。',水:'女命以土为官星（夫星），土旺则夫稳重可靠。'})[dmEl]}</div>
    </div>

    <div class="analysis-section">
      <h2>健康提醒</h2>
      <div class="analysis-text">${info.health}</div>
      <div class="analysis-text" style="margin-top:8px">五行${dmEl}对应：${({木:'肝、胆、筋、眼睛',火:'心、小肠、血液、眼睛',土:'脾、胃、肌肉、口腔',金:'肺、大肠、鼻、皮肤',水:'肾、膀胱、耳朵、骨骼'})[dmEl]}，日常养生宜注意相关器官的保养。</div>

      <h2>${currentYear}年（${yearStem}年）流年运势</h2>

      <div class="analysis-text" style="margin-top:8px">${getYearFortune(dm,yearStem)}</div>

      <h2>十神详解</h2>

  document.getElementById('analysis-content').innerHTML=html;
}

function getYearFortune(dm,yearStem){
  const el=STEM_EL[dm],yel=STEM_EL[yearStem];
  const P={木:'火',火:'土',土:'金',金:'水',水:'木'},PB={木:'水',水:'金',金:'土',土:'火',火:'木'};
  const C={木:'土',土:'水',水:'火',火:'金',金:'木'},CB={木:'金',金:'火',火:'水',水:'土',土:'木'};
  if(yel===el) return `流年与日主同五行，比肩之年。主竞争、合作、社交活跃。适合拓展人脉、合伙做事，但也要注意破财风险。`;
  if(P[el]===yel) return `流年为日主所生，食伤之年。主才华展现、创意迸发、表达欲强。适合创作、学习新技能，但也要注意言多必失。`;
  if(PB[el]===yel) return `流年生助日主，印星之年。主贵人相助、学业进步、获得支持。适合进修、考试、接受长辈帮助。`;
  if(C[el]===yel) return `流年为日主所克，财星之年。主财运提升、收入增加、感情活跃。适合投资理财、拓展业务，但也要注意劳逸结合。`;
  if(CB[el]===yel) return `流年克制日主，官杀之年。主压力增大、责任加重、有变动。适合接受挑战、升职加薪，但也要注意身体健康和人际关系。`;
  return `流年五行${yel}与日主关系较为特殊，需结合整体八字综合判断。`;
}

// ===== ZiWei =====
function renderZiWei(data){
  if(!data){document.getElementById('zw-chart').innerHTML='<div style="grid-column:span 4;text-align:center;color:rgba(232,220,200,.3)">数据加载失败</div>';return}
  const palaces=data.palaces||[];
  document.getElementById('zw-info').innerHTML=`
    <div class="info-card"><h3>命主</h3><div class="val">${data.soul||'-'}</div></div>
    <div class="info-card"><h3>身主</h3><div class="val">${data.body||'-'}</div></div>
    <div class="info-card"><h3>五行局</h3><div class="val">${data.fiveElementClass||'-'}</div></div>
    <div class="info-card"><h3>阴阳</h3><div class="val">${gender==='male'?'♂ 男':'♀ 女'}</div></div>`;

  const layout=[3,2,1,0,4,null,null,11,5,null,null,10,6,7,8,9];
  let html='';
  layout.forEach((idx,i)=>{
    if(idx===null){
      if(i===5)html+=`<div class="zw-palace" style="display:flex;flex-direction:column;justify-content:center;align-items:center;border-color:transparent;background:transparent"><div style="font-size:11px;color:rgba(232,220,200,.3)">${data.lunarYear||''}年</div><div style="font-size:11px;color:rgba(232,220,200,.3)">${data.lunarMonth||''}月${data.lunarDay||''}日</div><div style="font-size:13px;color:#f0c860;margin-top:4px">${data.soul||''} 命</div></div>`;
      else html+='<div style="background:transparent;border:none"></div>';return}
    const p=palaces[idx];if(!p){html+='<div class="zw-palace"></div>';return}
    const isLife=p.name==='命宫'||p.isBodyPalace;
    let starsHTML='';
    (p.majorStars||[]).forEach(s=>{let cls='zw-star major';if(s.bright==='庙'||s.bright==='旺')cls+=' bright';starsHTML+=`<span class="${cls}">${s.name}${s.mutagen?'<span class="zw-mutagen">'+s.mutagen+'</span>':''}</span>`});
    (p.minorStars||[]).forEach(s=>{starsHTML+=`<span class="zw-star minor">${s.name}${s.mutagen?'<span class="zw-mutagen">'+s.mutagen+'</span>':''}</span>`});
    html+=`<div class="zw-palace ${isLife?'life':''}" data-idx="${idx}" onclick="highlightPalace(${idx})"><div class="zw-palace-name">${p.name||''}${p.isBodyPalace?' (身)':''}</div><div style="font-size:9px;color:rgba(232,220,200,.25)">${p.heavenlyStem||''}${p.earthlyBranch||''}</div><div class="zw-palace-stars">${starsHTML||'<span style="color:rgba(232,220,200,.15)">无主星</span>'}</div></div>`;
  });
  document.getElementById('zw-chart').innerHTML=html;
}

function highlightPalace(idx){
  document.querySelectorAll('.zw-palace').forEach(p=>p.style.borderColor='');
  const el=document.querySelector(`.zw-palace[data-idx="${idx}"]`);if(el)el.style.borderColor='rgba(240,200,96,.5)';
}

function renderZwAnalysis(data){
  if(!data)return;
  const palaces=data.palaces||[];
  const lifeP=palaces.find(p=>p.name==='命宫');
  if(!lifeP)return;
  const majorStars=lifeP.majorStars||[];
  if(majorStars.length===0){document.getElementById('zw-analysis').style.display='none';return}
  const mainStar=majorStars[0].name;
  const starInfo=STAR_ANALYSIS[mainStar];
  if(!starInfo)return;

  const html=`
    <h2>紫微命盘解析</h2>
    <div class="analysis-section" style="border:none;padding:0">
      <h3>命宫主星：${mainStar}</h3>
      <div class="analysis-text">${starInfo.trait}</div>
      <div style="margin-top:8px"><span class="tag tag-neutral">事业：${starInfo.career}</span></div>
      <div style="margin-top:4px"><span class="tag tag-neutral">感情：${starInfo.love}</span></div>
    </div>
    <div style="margin-top:16px">
      <h3>命宫星曜组合</h3>
      <div class="analysis-text">命宫共有 ${majorStars.length} 颗主星${majorStars.length>1?'，形成'+mainStar+'为主的星曜组合。单星入命个性鲜明，多星组合则性格更为复杂多元。':'独坐命宫，个性鲜明突出。'}</div>
      ${majorStars.length>1?`<div class="analysis-text" style="margin-top:8px">辅星：${majorStars.slice(1).map(s=>s.name).join('、')}。这些星曜与${mainStar}相互作用，使命主性格更加丰富立体。</div>`:''}
    </div>
    <div style="margin-top:16px">
      <h3>十二宫概览</h3>
      <div class="analysis-text">${palaces.map(p=>{
        const stars=(p.majorStars||[]).map(s=>s.name).join('');
        return stars?`<span class="tag tag-neutral">${p.name}：${stars}</span>`:''
      }).filter(Boolean).join(' ')}</div>
    </div>`;

  document.getElementById('zw-analysis').innerHTML=html;
  document.getElementById('zw-analysis').style.display='block';
}

calculate();
</script>
